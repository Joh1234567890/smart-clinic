spring.application.name=smartclinic

# ---------------------------------------------------------------------------
# PostgreSQL Datasource
# ---------------------------------------------------------------------------
# Update these to match your local/remote PostgreSQL instance.
# Create the database first, e.g.: CREATE DATABASE smart_clinic_db;
spring.datasource.url=jdbc:postgresql://localhost:5432/smart_clinic_db
spring.datasource.username=postgres
spring.datasource.password=123456789
spring.datasource.driver-class-name=org.postgresql.Driver

# ---------------------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------------------
# ddl-auto=update will auto-create/update tables based on entities.
# Use "validate" or "none" in production and manage schema via migrations instead.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# ---------------------------------------------------------------------------
# Server
# ---------------------------------------------------------------------------
server.port=8080

# ---------------------------------------------------------------------------
# Jackson (date formatting for JSON responses)
# ---------------------------------------------------------------------------
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
spring.jackson.time-zone=UTC

# ---------------------------------------------------------------------------
# JWT
# ---------------------------------------------------------------------------
# Base64-encoded HMAC-SHA256 secret used to sign/verify tokens.
# This is a randomly generated key for LOCAL DEVELOPMENT ONLY.
# For any real deployment, override this via an environment variable
# (e.g. JWT_SECRET) instead of committing a secret to source control:
#   jwt.secret=${JWT_SECRET}
jwt.secret=AuM4g/0m0RO2sGLi2DHQhR/vQ7FYhqxmYonkM+lC5noRA/PZC3YN/PCxQlcqL0WDV9gzot30aLbwLf3U6GvPPQ==
# Token lifetime in milliseconds. 86400000 = 24 hours.
jwt.expiration-ms=86400000

